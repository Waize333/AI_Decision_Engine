# .github/workflows/ci.yml
# ==========================
# PURPOSE:
#   GitHub Actions CI/CD pipeline.
#   Runs automatically on every push and pull request.
#
# WHAT IT DOES:
#   1. lint    — checks code style with ruff (fast linter)
#   2. test    — runs pytest with coverage report
#   3. build   — builds Docker image (validates Dockerfile is correct)
#   4. deploy  — (placeholder) deploys to production on main branch
#
# WHY CI/CD?
#   - Catches bugs before they reach production
#   - Enforces code quality automatically (can't merge broken code)
#   - Provides fast feedback (< 5 min usually)
#   - Documents how to build and test the project

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:

  # ─── JOB 1: LINT ───────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run ruff linter
        # ruff is 100x faster than flake8 — written in Rust
        run: ruff check backend/app/ --select E,F,W,I

      - name: Run ruff formatter check
        run: ruff format backend/app/ --check


  # ─── JOB 2: TEST ───────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint    # only run tests if linting passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite pytest-asyncio httpx pytest-cov

      - name: Run test suite with coverage
        working-directory: backend
        env:
          # Use in-memory SQLite for tests (no real DBs needed)
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          MONGO_URL: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-for-production
          APP_ENV: development
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false   # don't fail if Codecov is down


  # ─── JOB 3: BUILD DOCKER ───────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test    # only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push on PRs)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false          # just build to validate it compiles
          tags: ai-decision-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ─── JOB 4: DEPLOY (MAIN ONLY) ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # requires manual approval in GitHub Settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Option A: Deploy to Render ─────────────────────────
      # - name: Deploy to Render
      #   run: |
      #     curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # ── Option B: Deploy to AWS ECS ────────────────────────
