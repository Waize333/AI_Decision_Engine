# backend/pytest.ini
# ====================
# pytest configuration for the backend test suite.

[pytest]
# Run async tests with asyncio
asyncio_mode = auto

# Test discovery: look in tests/ directory
testpaths = tests

# Show extra test info
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

# Markers (prevent "PytestUnknownMarkWarning")
markers =
    unit: Pure unit tests with no external dependencies
    integration: Tests requiring the full app stack
    slow: Tests that take > 1 second

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
