# alembic.ini — Alembic configuration file
# ==========================================
# This file configures the Alembic migration tool.
# Most database settings are OVERRIDDEN by env.py (which reads from .env),
# so you rarely need to edit this file.

[alembic]
# Path to migration scripts (relative to this file's directory)
script_location = alembic

# Migration file naming: timestamp + slug
# e.g. 20260223_1234_add_column_to_users.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Prepend sys.path so Python can find our app module
# Run alembic from: cd backend && alembic upgrade head
prepend_sys_path = .

# alembic checks model changes against this timezone
timezone = UTC

[post_write_hooks]
# Optional: auto-format generated migration files with ruff
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
